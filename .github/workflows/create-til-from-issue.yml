name: Create TIL from Issue

on:
  issues:
    types: [opened, edited]

jobs:
  create-til:
    if: github.actor == 'markmichon' && startsWith(github.event.issue.title, 'TIL:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run TIL creation script
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/create-til.js')
            await script({github, context})
